name: m365-pull Static Web App Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

concurrency:
  group: deploy-swa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Build and Deploy Job
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        # ┌─────────────────────────────────────────────────────────────────┐
        # │ SERVICE TEMPORARILY OFFLINE (Option A — reversible maintenance).  │
        # │ Deploys the static maintenance/ page instead of building the app. │
        # │ skip_app_build => no Oryx/npm build runs; maintenance/ is served  │
        # │ as-is, keeping the SWA resource + URL intact. App source is        │
        # │ untouched and still builds green.                                  │
        # │                                                                    │
        # │ TO BRING THE APP BACK: revert this commit (restores app_location  │
        # │ "/", output_location "dist", the VITE_* build env, and removes    │
        # │ skip_app_build) and push. See commit message for details.          │
        # └─────────────────────────────────────────────────────────────────┘
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "maintenance"
          api_location: ""
          output_location: ""
          skip_app_build: "true"
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
